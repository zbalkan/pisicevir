name: Debian package tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: debian-package-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Reproducible Debian package
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    env:
      DEBIAN_FRONTEND: noninteractive
      LC_ALL: C.UTF-8
      PYTHONHASHSEED: "0"
      PYTHONUNBUFFERED: "1"
      QT_QPA_PLATFORM: offscreen
      TZ: UTC
      MAINTAINER_NAME: Zafer Balkan
      MAINTAINER_EMAIL: zbalkan@users.noreply.github.com
      PROJECT_HOMEPAGE: https://github.com/zbalkan/pisicevir
      DEB_BUILD_OPTIONS: noautodbgsym reproducible=+fixfilepath
      DEB_BUILD_MAINT_OPTIONS: hardening=+all reproducible=+fixfilepath

    steps:
      - name: Check out repository and tags
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.lock

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            binutils \
            build-essential \
            debhelper \
            devscripts \
            dh-python \
            dpkg-dev \
            fakeroot \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            lintian \
            pybuild-plugin-pyproject \
            python3-all \
            python3-pydantic \
            python3-pyqt5 \
            python3-pytest \
            python3-pytestqt \
            python3-setuptools \
            python3-yaml \
            python3-zstandard

      - name: Install locked Python test environment
        run: |
          python -m pip install --no-deps --requirement requirements/ci.lock
          python -m pip install --no-deps --no-build-isolation --editable .
          python -m pip check

      - name: Resolve deterministic build metadata
        id: metadata
        run: |
          python <<'PY'
          import os
          import subprocess
          from pathlib import Path
          from tools.release_metadata import read_source_version

          values = {
              "version": read_source_version(),
              "source_date_epoch": subprocess.run(
                  ["git", "show", "-s", "--format=%ct", "HEAD"],
                  check=True,
                  text=True,
                  capture_output=True,
              ).stdout.strip(),
          }
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              for key, value in values.items():
                  output.write(f"{key}={value}\n")
          PY
          echo "SOURCE_DATE_EPOCH=${{ steps.metadata.outputs.source_date_epoch }}" >> "$GITHUB_ENV"

      - name: Run source tests
        run: |
          python -m compileall -q src tests tools
          python -m pytest -ra

      - name: Generate deterministic changelog
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          mkdir -p dist
          python <<'PY'
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          version = os.environ["VERSION"]
          epoch = int(os.environ["SOURCE_DATE_EPOCH"])
          date = datetime.fromtimestamp(epoch, tz=timezone.utc).strftime(
              "%a, %d %b %Y %H:%M:%S +0000"
          )
          Path("dist/debian-changelog").write_text(
              f"pisicevir ({version}-1) unstable; urgency=medium\n\n"
              "  * Continuous integration reproducibility build.\n\n"
              f" -- {os.environ['MAINTAINER_NAME']} "
              f"<{os.environ['MAINTAINER_EMAIL']}>  {date}\n",
              encoding="utf-8",
              newline="\n",
          )
          PY

      - name: Create two isolated source snapshots
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          set -euo pipefail
          rm -rf /tmp/pisicevir-build-1 /tmp/pisicevir-build-2 /tmp/pisicevir-source.tar
          mkdir -p /tmp/pisicevir-build-1 /tmp/pisicevir-build-2
          git archive --format=tar --prefix="pisicevir-$VERSION/" HEAD > /tmp/pisicevir-source.tar

          for build in 1 2; do
            tar -xf /tmp/pisicevir-source.tar -C "/tmp/pisicevir-build-$build"
            gzip -n -c /tmp/pisicevir-source.tar > \
              "/tmp/pisicevir-build-$build/pisicevir_${VERSION}.orig.tar.gz"
            cp dist/debian-changelog "/tmp/pisicevir-build-$build/debian-changelog"
            (
              cd "/tmp/pisicevir-build-$build/pisicevir-$VERSION"
              python tools/generate_debian_packaging.py \
                --changelog ../debian-changelog \
                --maintainer-name "$MAINTAINER_NAME" \
                --maintainer-email "$MAINTAINER_EMAIL" \
                --homepage "$PROJECT_HOMEPAGE"
              find . -exec touch --no-dereference --date="@$SOURCE_DATE_EPOCH" {} +
            )
          done

      - name: Build Debian packages twice
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          set -euo pipefail
          for build in 1 2; do
            (
              cd "/tmp/pisicevir-build-$build/pisicevir-$VERSION"
              dpkg-buildpackage -us -uc -b
            )
          done

      - name: Compare package outputs
        run: |
          set -euo pipefail
          mapfile -t packages < <(
            find /tmp/pisicevir-build-1 -maxdepth 1 -type f -name '*.deb' -printf '%f\n' | sort
          )
          test "${#packages[@]}" -eq 2
          for package in "${packages[@]}"; do
            test -f "/tmp/pisicevir-build-2/$package"
            cmp "/tmp/pisicevir-build-1/$package" "/tmp/pisicevir-build-2/$package"
            sha256sum "/tmp/pisicevir-build-1/$package"
          done

      - name: Lint and inspect package payloads
        run: |
          set -euo pipefail
          lintian --fail-on error /tmp/pisicevir-build-1/*.changes
          python tools/verify_debian_artifacts.py /tmp/pisicevir-build-1/*.deb

      - name: Install, test, and remove packages
        run: |
          set -euo pipefail
          sudo apt-get install --yes /tmp/pisicevir-build-1/*.deb
          /usr/bin/pisicevir --version
          /usr/bin/pisicevir --help >/dev/null
          /usr/bin/python3 -c 'import pisicevir; print(pisicevir.__version__)'
          QT_QPA_PLATFORM=offscreen /usr/bin/python3 -c \
            'from pisicevir.gui import PisicevirGUI; print(PisicevirGUI)'
          sudo apt-get purge --yes pisicevir-gui pisicevir
