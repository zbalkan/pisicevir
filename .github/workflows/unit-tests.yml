name: Unit tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    env:
      PYTHONHASHSEED: "0"
      PYTHONUNBUFFERED: "1"
      QT_QPA_PLATFORM: "offscreen"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify repository layout
        run: |
          test -f pyproject.toml
          test -f requirements/ci.lock
          test -f src/pisicevir/__init__.py
          test -d tests
          test -d tools

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/ci.lock

      - name: Install system test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            binutils \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0

      - name: Install locked test environment
        run: |
          python -m pip install --requirement requirements/ci.lock
          python -m pip install --no-deps --no-build-isolation --editable .
          python -m pip check

      - name: Compile Python sources
        run: python -m compileall -q src tests tools

      - name: Run unit tests
        run: python -m pytest -ra
