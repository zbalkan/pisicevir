name: Unit tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    env:
      PYTHONUNBUFFERED: "1"
      QT_QPA_PLATFORM: "offscreen"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify repository layout
        run: |
          test -f pyproject.toml
          test -f README.md
          test -d src/pisicevir
          test -f src/pisicevir/__init__.py
          test -d tests
          find src/pisicevir -maxdepth 3 -type f -print | sort

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            binutils \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install project and test dependencies
        run: python -m pip install --editable ".[gui,test]"

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Run unit tests
        run: python -m pytest -ra
