name: Release Debian packages

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-deb
  cancel-in-progress: false

jobs:
  release:
    name: Tag and build Debian packages
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DEBIAN_FRONTEND: noninteractive
      PYTHONUNBUFFERED: "1"
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository and tags
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install release tooling
        run: python -m pip install --upgrade semver

      - name: Validate release version
        id: version
        shell: bash
        run: |
          python <<'PY'
          import ast
          import os
          import subprocess
          from pathlib import Path

          import semver

          init_file = Path("src/pisicevir/__init__.py")
          module = ast.parse(init_file.read_text(encoding="utf-8"), filename=str(init_file))
          source_version = None
          for node in module.body:
              if not isinstance(node, ast.Assign):
                  continue
              if any(isinstance(target, ast.Name) and target.id == "__version__" for target in node.targets):
                  source_version = ast.literal_eval(node.value)
                  break

          if not isinstance(source_version, str):
              raise SystemExit("Unable to read __version__ from src/pisicevir/__init__.py")

          try:
              current = semver.Version.parse(source_version)
          except ValueError as exc:
              raise SystemExit(f"Source version is not valid SemVer: {source_version}: {exc}") from exc

          subprocess.run(["git", "fetch", "--tags", "--force"], check=True)
          raw_tags = subprocess.run(
              ["git", "tag", "--list", "v*"],
              check=True,
              text=True,
              capture_output=True,
          ).stdout.splitlines()

          versions = []
          for tag in raw_tags:
              try:
                  parsed = semver.Version.parse(tag[1:])
              except ValueError:
                  print(f"Ignoring non-SemVer tag: {tag}")
                  continue

              reachable = subprocess.run(
                  ["git", "merge-base", "--is-ancestor", tag, "HEAD"],
                  check=False,
              ).returncode == 0
              if reachable:
                  versions.append((parsed, tag))
              else:
                  print(f"Ignoring SemVer tag not reachable from HEAD: {tag}")

          latest_version = None
          latest_tag = None
          if versions:
              latest_version, latest_tag = max(versions, key=lambda item: item[0])
              if current == latest_version:
                  raise SystemExit(
                      f"Release refused: source version {current} is already published as {latest_tag}"
                  )
              if current < latest_version:
                  raise SystemExit(
                      f"Release refused: source version {current} is lower than latest tag {latest_tag}"
                  )

          tag = f"v{current}"
          if subprocess.run(
              ["git", "rev-parse", "--verify", "--quiet", f"refs/tags/{tag}"],
              check=False,
          ).returncode == 0:
              raise SystemExit(f"Release refused: tag {tag} already exists")

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"version={current}\n")
              output.write(f"tag={tag}\n")
              output.write(f"debian_version={current}-1\n")
              output.write(f"latest_tag={latest_tag or ''}\n")

          if latest_tag:
              print(f"Release accepted: {latest_tag} -> {tag}")
          else:
              print(f"Release accepted: no previous SemVer tag -> {tag}")
          PY

      - name: Generate release notes and Debian changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          LATEST_TAG: ${{ steps.version.outputs.latest_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python <<'PY'
          import os
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          import semver

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          latest_tag = os.environ.get("LATEST_TAG", "")
          repository = os.environ["REPOSITORY"]

          def git(*args: str) -> str:
              return subprocess.run(
                  ["git", *args],
                  check=True,
                  text=True,
                  capture_output=True,
              ).stdout.strip()

          def commits_between(previous: str | None, current: str) -> list[tuple[str, str]]:
              revision = f"{previous}..{current}" if previous else current
              output = git(
                  "log",
                  revision,
                  "--no-merges",
                  "--reverse",
                  "--format=%H%x1f%s",
              )
              commits = []
              for line in output.splitlines():
                  if not line.strip():
                      continue
                  sha, subject = line.split("\x1f", 1)
                  commits.append((sha, subject.strip()))
              return commits

          current_commits = commits_between(latest_tag or None, "HEAD")
          if not current_commits:
              raise SystemExit("Release refused: there are no commits since the previous tag")

          dist = Path("dist")
          dist.mkdir(exist_ok=True)
          notes_path = dist / "RELEASE-NOTES.md"

          notes = [f"# Pisicevir {version}", ""]
          if latest_tag:
              notes.extend(
                  [
                      f"Changes since `{latest_tag}`:",
                      "",
                  ]
              )
          else:
              notes.extend(["Initial release changes:", ""])

          for sha, subject in current_commits:
              notes.append(
                  f"- {subject} ([`{sha[:7]}`](https://github.com/{repository}/commit/{sha}))"
              )

          if latest_tag:
              notes.extend(
                  [
                      "",
                      f"**Full comparison:** `{latest_tag}...{tag}`",
                  ]
              )

          notes_path.write_text("\n".join(notes) + "\n", encoding="utf-8")

          raw_tags = git("tag", "--list", "v*").splitlines()
          releases: list[tuple[semver.Version, str, str]] = []
          for existing_tag in raw_tags:
              try:
                  parsed = semver.Version.parse(existing_tag[1:])
              except ValueError:
                  continue
              if subprocess.run(
                  ["git", "merge-base", "--is-ancestor", existing_tag, "HEAD"],
                  check=False,
              ).returncode == 0:
                  releases.append((parsed, existing_tag, existing_tag))

          releases.sort(key=lambda item: item[0])
          releases.append((semver.Version.parse(version), tag, "HEAD"))

          changelog_entries = []
          previous_ref = None
          for release_version, release_tag, release_ref in releases:
              release_commits = commits_between(previous_ref, release_ref)
              if not release_commits:
                  previous_ref = release_ref
                  continue

              if release_ref == "HEAD":
                  date = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S +0000")
              else:
                  date = git("show", "-s", "--format=%aD", f"{release_ref}^{{}}")

              entry = [
                  f"pisicevir ({release_version}-1) unstable; urgency=medium",
                  "",
              ]
              for _, subject in release_commits:
                  entry.append(f"  * {subject}")
              entry.extend(
                  [
                      "",
                      f" -- Caracal Project <maintainers@example.invalid>  {date}",
                      "",
                  ]
              )
              changelog_entries.append("\n".join(entry))
              previous_ref = release_ref

          Path("debian/changelog").write_text(
              "\n".join(reversed(changelog_entries)).rstrip() + "\n",
              encoding="utf-8",
          )

          print(notes_path.read_text(encoding="utf-8"))
          print(Path("debian/changelog").read_text(encoding="utf-8"))
          PY

      - name: Install project and run tests
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --editable ".[gui,test]"
          python -m compileall -q src tests
          python -m pytest -ra

      - name: Create and push version tag
        id: tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "$TAG" --message "Pisicevir $VERSION"
          git push origin "$TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            devscripts \
            debhelper \
            dh-python \
            pybuild-plugin-pyproject \
            python3-all \
            python3-setuptools \
            python3-pytest \
            python3-yaml \
            python3-pydantic \
            python3-pyqt5 \
            binutils \
            lintian

      - name: Build Debian binary packages
        run: dpkg-buildpackage -us -uc -b

      - name: Collect release artifacts
        run: |
          mkdir -p dist/debian
          find .. -maxdepth 1 -type f \
            \( -name 'pisicevir_*.deb' \
            -o -name 'pisicevir-gui_*.deb' \
            -o -name 'pisicevir_*.changes' \
            -o -name 'pisicevir_*.buildinfo' \) \
            -exec cp -v {} dist/debian/ \;

          cp debian/changelog dist/debian/debian-changelog
          cp dist/RELEASE-NOTES.md dist/debian/RELEASE-NOTES.md

          test -n "$(find dist/debian -maxdepth 1 -name 'pisicevir_*.deb' -print -quit)"
          test -n "$(find dist/debian -maxdepth 1 -name 'pisicevir-gui_*.deb' -print -quit)"

          lintian dist/debian/*.changes || true
          (
            cd dist/debian
            sha256sum * > SHA256SUMS
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pisicevir-${{ steps.version.outputs.version }}-debian
          path: dist/debian/
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" dist/debian/* \
            --verify-tag \
            --title "Pisicevir $VERSION" \
            --notes-file dist/RELEASE-NOTES.md

      - name: Remove tag when release fails
        if: failure() && steps.tag.outputs.created == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git push --delete origin "$TAG" || true
